{% extends "base.html" %}
{% block content %}
<section class="page">
  <h3>Pagina 1 · Panoramica Operativa</h3>
  <div class="grid">
    <div class="card span-3">
      <h2>TSI ISTANTANEO</h2>
      <div class="kpi" id="kpiTSI">—</div>
      <div class="row" style="margin-top:10px">
        <div class="tag" id="tagQual">Qualità: —</div>
        <div class="tag" id="tagFreq">Freq: —</div>
      </div>
      <div class="sub" id="stateSub">In attesa dati…</div>
    </div>

    <div class="card span-3">
      <h2>FORECAST 72h</h2>
      <div class="kpi" id="kpiPred">—</div>
      <div class="row" style="margin-top:10px">
        <div class="tag" id="tagPI">PI 80%: —</div>
        <div class="tag" id="tagHours">Ore: —</div>
      </div>
      <div class="sub" id="fcSub">—</div>
    </div>

    <div class="card span-3">
      <h2>PROGNOSI</h2>
      <div class="kpi" id="kpiCourse">—</div>
      <div class="row" style="margin-top:10px">
        <div class="tag" id="tagTrend">Trend: —</div>
        <div class="tag" id="tagSevere">Grave: —</div>
      </div>
      <div class="sub" id="progSub">—</div>
    </div>

    <div class="card span-3">
      <h2>DPI (30/90)</h2>
      <div class="kpi" id="kpiRisk">—</div>
      <div class="row" style="margin-top:10px">
        <div class="tag" id="tagR30">30g: —</div>
        <div class="tag" id="tagR90">90g: —</div>
      </div>
      <div class="sub" id="riskSub">Analisi rischio cumulata.</div>
    </div>
  </div>
</section>
{% endblock %}
